<mat-card class="card">

<div class="card-header">
    <mat-icon>person_add</mat-icon>
<h2>Add Student</h2>
</div>
<div class="form-container">
<mat-form-field appearance="outline">
    <mat-label>Name</mat-label>
<input matInput [(ngModel)]="newStudent.name"  />
</mat-form-field>

<mat-form-field appearance="outline">
<mat-label>Email</mat-label>
<input matInput [(ngModel)]="newStudent.email"  />
</mat-form-field>

<mat-form-field appearance="outline">
    <mat-label>Contact No</mat-label>
<input matInput [(ngModel)]="newStudent.contactNo"  />
</mat-form-field>

<mat-form-field appearance="outline">
        <mat-label>Address</mat-label>
<input matInput [(ngModel)]="newStudent.address"  />
</mat-form-field>
<button mat-raised-button color="primary" (click)="addStudent()">{{ editIndex !== null ? 'Update' : 'Add' }}</button>
</div>
</mat-card>
<mat-card class="card">
<h2>Student List</h2>
<mat-form-field appearance="outline">
     <mat-label>Select Student</mat-label>
     <mat-select [(ngModel)]="selectedStudentId" (selectionChange)="onSelectStudent()">
    <mat-option [value]="null">-- Select Student --</mat-option>
    <mat-option *ngFor="let s of students" [value]="s.id">
        {{s.name}}
    </mat-option>
</mat-select>
</mat-form-field>

</mat-card>
<mat-card class="card">
<h3>Student List</h3>
<mat-list>
    <mat-list-item *ngFor="let s of students; let i = index">
        <span matLine>{{i+1}}. {{s.name}}</span>
    </mat-list-item>
</mat-list>
</mat-card>

<mat-card class="card" *ngIf="students.length>0">
<h3>Selected Students</h3>
<table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z2">

    <!--index -->
    <ng-container matColumnDef="index">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>#</th>
        <td mat-cell *matCellDef="let element; let i=index">{{i+1}}</td>
    </ng-container>
    <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
        <td mat-cell *matCellDef="let element;">{{element.name}}</td>
    </ng-container>
    <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
        <td mat-cell *matCellDef="let element;">{{element.email}}</td>
    </ng-container>
    <ng-container matColumnDef="contactNo">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Contact No</th>
        <td mat-cell *matCellDef="let element;">{{element.contactNo}}</td>
    </ng-container>

    <ng-container matColumnDef="address">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Address</th>
        <td mat-cell *matCellDef="let element;">{{element.address}}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let element; let i=index">
            <button mat-icon-button color="primary" (click)="editStudent(element, i)">
                <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteStudent(element.id)">
                <mat-icon>delete</mat-icon>
            </button>
        </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <tr mat-row *matRowDef="let row; columns:displayedColumns"></tr>
   
</table>
 <mat-paginator [pageSize]="5" [pageSizeOptions]="[5,10,20]" showFirstLastButtons></mat-paginator>
</mat-card>
